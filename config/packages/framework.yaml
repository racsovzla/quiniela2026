# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    default_locale: en
    set_locale_from_accept_language: false
    enabled_locales: ['en', 'es']
    php_errors:
        log: true

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

    rate_limiter:
        verify_code:
            policy: 'sliding_window'
            limit: 8
            interval: '10 minutes'
        verify_resend:
            policy: 'sliding_window'
            limit: 3
            interval: '30 minutes'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file

when@prod:
    framework:
        # Trust Render reverse-proxy headers so request scheme/host are resolved correctly.
        trusted_proxies: '127.0.0.1,::1,REMOTE_ADDR'
        trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-prefix']
        session:
            # Required when app runs embedded (e.g. huggingface.co iframe), otherwise browser drops session cookie.
            cookie_samesite: none
            cookie_secure: true
