<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sin conexión · Quiniela 2026</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(140deg, #6A19E6, #E4002B 55%, #C6F000);
            color: #fff;
            text-align: center;
            padding: 1.5rem;
        }
        .card {
            background: rgba(0, 0, 0, .35);
            border-radius: 18px;
            padding: 2rem 1.75rem;
            max-width: 22rem;
            backdrop-filter: blur(4px);
        }
        .ball { font-size: 3.25rem; }
        h1 { font-size: 1.4rem; margin: .75rem 0 .5rem; }
        p { opacity: .85; line-height: 1.45; margin: 0 0 1.25rem; }
        button {
            border: 0;
            border-radius: 999px;
            padding: .65rem 1.4rem;
            font-size: 1rem;
            font-weight: 600;
            background: #fff;
            color: #0a7d33;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="ball">⚽</div>
        <h1>Sin conexión</h1>
        <p>No pudimos cargar Quiniela 2026. Revisa tu conexión a internet e inténtalo de nuevo.</p>
        <button onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
