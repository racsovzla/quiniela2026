<VirtualHost *:80>
    ServerName quiniela2026.com
    ServerAlias www.quiniela2026.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName quiniela2026.com
    ServerAlias www.quiniela2026.com

    DocumentRoot /var/www/quiniela2026/public

    <Directory /var/www/quiniela2026/public>
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/quiniela2026.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/quiniela2026.com/privkey.pem

    # App env; move sensitive values to Apache envvars, systemd, or the process manager.
    SetEnv APP_ENV prod
    SetEnv APP_DEBUG 0
    SetEnv APP_SECRET change_me_to_a_long_random_secret
    SetEnv DATABASE_URL mysql://app_user:STRONG_PASSWORD@127.0.0.1:3306/quiniela2026?serverVersion=8.0.32&charset=utf8mb4
    SetEnv MAILER_DSN smtp://youraccount@gmail.com:YOUR_APP_PASSWORD@smtp.gmail.com:587?encryption=tls&auth_mode=login
    SetEnv MAILER_FROM_EMAIL youraccount@gmail.com
    SetEnv MAILER_FROM_NAME Quiniela 2026

    # Only if the app is behind a reverse proxy / load balancer.
    # SetEnv SYMFONY_TRUSTED_PROXIES 127.0.0.1,REMOTE_ADDR
    # SetEnv SYMFONY_TRUSTED_HOSTS ^(quiniela2026\.com|www\.quiniela2026\.com)$

    ErrorLog ${APACHE_LOG_DIR}/quiniela2026_error.log
    CustomLog ${APACHE_LOG_DIR}/quiniela2026_access.log combined
</VirtualHost>
</IfModule>