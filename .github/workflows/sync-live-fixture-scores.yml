# Triggered by cron-job.org (every 5 min) or manually from GitHub Actions UI.
#
# cron-job.org setup:
#   URL:    https://api.github.com/repos/racsovzla/quiniela2026/actions/workflows/sync-live-fixture-scores.yml/dispatches
#   Method: POST
#   Headers:
#     Authorization: Bearer <GITHUB_PAT with actions:write>
#     Accept: application/vnd.github+json
#     X-GitHub-Api-Version: 2022-11-28
#   Body (JSON): {"ref":"master"}
#   Schedule: every 5 minutes
name: Sync live fixture scores

on:
  workflow_dispatch:

concurrency:
  group: sync-live-fixture-scores
  cancel-in-progress: false

jobs:
  sync-live-fixture-scores:
    runs-on: ubuntu-latest
    env:
      APP_ENV: prod
      APP_DEBUG: '0'
      APP_SECRET: ${{ secrets.APP_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MAILER_DSN: ${{ secrets.MAILER_DSN }}
      MAILER_FROM_EMAIL: ${{ secrets.MAILER_FROM_EMAIL }}
      MAILER_FROM_NAME: ${{ secrets.MAILER_FROM_NAME }}
      CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
      CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      MESSENGER_TRANSPORT_DSN: sync://
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Run pending migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration --env=prod

      - name: Sync live fixture scores
        run: php bin/console app:sync-live-fixture-scores --env=prod
