<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icono de "Quiniela 2026" (vectorial). Fuente unica de los iconos PWA.
  Fondo con remolino de colores del Mundial 26 (morado / verde / rojo / lima)
  con formas curvas, inspirado en assets/icon-v2.png, y el wordmark
  tipografico "QUINIELA 2026". SVG plano para que se lea nitido en tamanos
  pequenos (favicon, header). Contenido en la zona segura (~80%) para maskable.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
    <radialGradient id="textglow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0"   stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="0.7" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.66" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.40"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <g clip-path="url(#round)">
    <!-- Base oscura -->
    <rect width="512" height="512" fill="#0E1117"/>

    <!-- Remolino de colores del Mundial 26 con bordes curvos (circulos solapados) -->
    <circle cx="150" cy="175" r="345" fill="#6A19E6"/> <!-- morado: arriba-izquierda -->
    <circle cx="430" cy="120" r="300" fill="#00A94F"/> <!-- verde: arriba-derecha -->
    <circle cx="495" cy="380" r="265" fill="#C6F000"/> <!-- lima: derecha-abajo -->
    <circle cx="215" cy="505" r="370" fill="#E4002B"/> <!-- rojo: abajo y centro -->

    <!-- Profundidad -->
    <rect width="512" height="512" fill="url(#vignette)"/>
    <ellipse cx="256" cy="216" rx="230" ry="210" fill="url(#textglow)"/>

    <!-- Hero "FIFA" -->
    <text x="256" y="288" text-anchor="middle" filter="url(#soft)"
          font-family="'Arial Black', Helvetica, Arial, sans-serif" font-weight="900"
          font-size="150" fill="#ffffff" letter-spacing="0">FIFA</text>

    <!-- Wordmark -->
    <text x="256" y="392" text-anchor="middle"
          font-family="'Arial Black', Helvetica, Arial, sans-serif" font-weight="900"
          font-size="52" fill="#ffffff" letter-spacing="4">QUINIELA</text>
    <text x="256" y="446" text-anchor="middle"
          font-family="'Arial Black', Helvetica, Arial, sans-serif" font-weight="900"
          font-size="44" fill="#ffffff" letter-spacing="14" opacity="0.92">2026</text>
  </g>
</svg>
